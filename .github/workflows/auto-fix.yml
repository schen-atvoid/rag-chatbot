name: DeepSeek Auto-Fix

on:
  issue_comment:
    types: [created]

jobs:
  auto-fix:
    # Only fire when:
    # - comment contains @claude
    # - comment is on a plain issue (not a PR)
    # - commenter is repo collaborator
    # - comment includes a fix-style verb (fix/repair/修复/修)
    if: |
      github.event.issue.pull_request == null &&
      contains(format('{0}', github.event.comment.body), '@claude') &&
      (
        contains(format('{0}', github.event.comment.body), 'fix') ||
        contains(format('{0}', github.event.comment.body), 'repair') ||
        contains(format('{0}', github.event.comment.body), '修复') ||
        contains(format('{0}', github.event.comment.body), '修一下') ||
        contains(format('{0}', github.event.comment.body), 'implement')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="auto-fix/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "Created branch: ${BRANCH}"
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Run DeepSeek agent (auto-fix mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MODEL_NAME: "deepseek-v4-flash"
          MAX_ROUNDS: "8"
          MODE: "auto-fix"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_BRANCH: ${{ steps.branch.outputs.branch }}
          SUMMARY_PATH: ${{ github.workspace }}/deepseek_summary.md
        run: python3 .github/scripts/deepseek_agent.py

      - name: Check for changes
        id: check
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changes detected:"
            git status --short
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "deepseek-agent[bot]"
          git config user.email "deepseek-agent[bot]@users.noreply.github.com"
          git add -A
          # Build a clean commit message
          MSG="fix(issue-${ISSUE_NUMBER}): auto-fix via DeepSeek agent"
          if [ -f deepseek_summary.md ]; then
            # Use the agent's first line as a hint
            HINT=$(head -n 1 deepseek_summary.md | head -c 100)
            if [ -n "$HINT" ] && [ "$HINT" != "#" ]; then
              MSG="${MSG}
          
          ${HINT}
          
          Auto-generated by DeepSeek V4 Flash agent. Review carefully before merge.
          Fixes #${ISSUE_NUMBER}"
            fi
          fi
          git commit -m "$MSG"
          git push -u origin "$BRANCH"
          echo "Pushed to $BRANCH"

      - name: Open PR via gh CLI
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Use a temp file for the body to avoid shell escaping issues
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<PR_BODY
          ## Auto-fix by DeepSeek Agent
          
          Closes #${ISSUE_NUMBER}
          
          ## Summary
          This PR was auto-generated by DeepSeek V4 Flash agent after @claude was invoked with a fix-style request on the issue.
          
          ## Original Issue
          **Title**: ${ISSUE_TITLE}
          PR_BODY
          
          # Append the issue body if it exists (escape any backticks to keep formatting)
          if [ -n "${ISSUE_BODY}" ]; then
            {
              echo ""
              echo "**Description**:"
              echo ""
              echo '```'
              echo "${ISSUE_BODY}" | head -n 50
              echo '```'
            } >> "$BODY_FILE"
          fi
          
          # Append the triggering comment
          {
            echo ""
            echo "## Triggering Comment"
            echo ""
            echo '```'
            echo "${COMMENT_BODY}"
            echo '```'
            echo ""
            echo "## Review Checklist"
            echo "- [ ] Agent's analysis is correct"
            echo "- [ ] Code changes are minimal and surgical"
            echo "- [ ] Tests pass (run project test suite)"
            echo "- [ ] No unrelated changes"
            echo "- [ ] No secrets committed"
          } >> "$BODY_FILE"
          
          TITLE="fix(issue-${ISSUE_NUMBER}): ${ISSUE_TITLE}"
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body-file "$BODY_FILE" \
            --label "auto-fix" \
            --assignee "${{ github.event.comment.user.login }}" \
            || echo "PR creation failed (may already exist)"
          
          rm -f "$BODY_FILE"

      - name: Comment on issue (success)
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Find the just-created PR for this branch
          PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            MSG="DeepSeek agent analyzed this issue and opened a PR to fix it: ${PR_URL}"
          else
            MSG="DeepSeek agent committed changes to branch \`${BRANCH}\` but PR creation may have failed. Please check."
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$MSG" || echo "Comment failed"

      - name: Comment on issue (no changes)
        if: steps.check.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "DeepSeek agent analyzed this issue but did not produce any code changes. The issue description may be too vague, or the requested change requires manual review. Please provide more context or @claude with a clearer request." || echo "Comment failed"
