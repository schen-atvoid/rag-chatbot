name: PR Review with DeepSeek

# 触发时机：PR 打开、更新、重新打开、标记为 ready for review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    
    # 配置权限（GITHUB_TOKEN 自动提供，无需配置 Secrets）
    permissions:
      contents: read          # 读取代码库
      pull-requests: write    # 在 PR 中发表评论
    
    steps:
      # 步骤 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整 git 历史，用于 diff
      
      # 步骤 2: 运行 DeepSeek 代码审查（使用社区 Action）
      - name: DeepSeek Code Review
        uses: deepseek-cr/deepseek-cr-action@v1.20
        with:
          # ===== 必填配置 =====
          # DeepSeek API Key（需要在仓库 Secrets 中配置 DEEPSEEK_API_KEY）
          api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          
          # 模型选择：使用 DeepSeek V4 Flash
          # 如果模型名有变化，请相应调整
          model: 'deepseek-chat'
          
          # ===== 自定义配置 =====
          # 系统提示词：定义审查标准和维度
          system_prompt: |
            你是一位资深的代码审查专家，请对当前 PR 的代码变更进行全面审查，重点关注以下领域：
            
            ## 1. 代码质量 (Code Quality)
            - 代码是否遵循简洁代码原则？
            - 是否有适当的错误处理和边界情况处理？
            - 代码可读性和可维护性如何？
            - 是否有代码重复或可优化的部分？
            
            ## 2. 安全性 (Security)
            - 是否存在潜在的安全漏洞（SQL注入、XSS、命令注入等）？
            - 输入验证是否充分？
            - 敏感信息是否正确处理（不在日志中暴露密钥等）？
            - 认证/授权逻辑是否正确？
            
            ## 3. 性能 (Performance)
            - 是否存在潜在的性能瓶颈？
            - 数据库查询是否高效（注意 N+1 问题）？
            - 是否有不必要的资源消耗？
            - 算法复杂度是否合理？
            
            ## 4. 测试 (Testing)
            - 是否有充分的单元测试覆盖？
            - 测试质量如何？是否覆盖边界情况？
            - 是否有缺失的测试场景？
            - 测试代码是否清晰易维护？
            
            ## 5. 文档 (Documentation)
            - 代码是否有适当的注释和文档字符串？
            - 新功能是否更新了 README？
            - API 文档是否准确？
            - 复杂逻辑是否有解释说明？
            
            ## 输出要求：
            - 使用清晰的 Markdown 格式
            - 对具体问题给出代码行引用
            - 对严重问题给出修复建议
            - 对优秀实践给予肯定
            - 优先报告高风险问题
          
          # ===== 可选配置（按需取消注释） =====
          
          # 自定义触发关键词（在 PR 评论中提及此词时触发）
          # trigger: '@deepseek'
          
          # 跳过审查的关键词（在 PR 标题或正文中包含这些词时跳过）
          # skip_keywords: 'skip review, wip, draft'
          
          # 自定义 API Base URL（如果不是使用官方 API）
          # base_url: 'https://api.deepseek.com'
          
          # 自定义最大 Token 数
          # max_tokens: 4000
          
          # 自定义温度参数（0-2，越低越严谨，越高越随机）
          # temperature: 0.3
