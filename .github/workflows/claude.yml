name: DeepSeek Interactive Assistant (read-only)

# 在 issue / PR 评论 / issue 正文 / PR review 里出现 @deepseek 时触发：
# 读取上下文（含 PR diff）→ 发给 DeepSeek → 把分析结果作为评论贴回。
# 本版为【只读】：不执行任何模型生成的命令，无 RCE 风险，适合安全使用。
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  deepseek-agent:
    # 仅当相关文本里包含 @deepseek 才运行
    if: |
      contains(format('{0}', github.event.comment.body), '@deepseek') ||
      contains(format('{0}', github.event.issue.body), '@deepseek') ||
      contains(format('{0}', github.event.issue.title), '@deepseek') ||
      contains(format('{0}', github.event.review.body), '@deepseek')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # 取全历史，便于对 PR 算 diff

      - name: Run DeepSeek Agent (read-only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MODEL_NAME: "deepseek-v4-pro"
        run: |
          python3 << 'AGENT_SCRIPT'
          import os, json, re, subprocess
          import urllib.request, urllib.error

          # ==================== 配置 ====================
          api_key   = os.environ["DEEPSEEK_API_KEY"]
          gh_token  = os.environ["GITHUB_TOKEN"]
          model     = os.environ.get("MODEL_NAME", "deepseek-v4-pro")
          repo      = os.environ["GITHUB_REPOSITORY"]
          event_nm  = os.environ["GITHUB_EVENT_NAME"]

          print(f"事件: {event_nm} | 仓库: {repo}")

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as f:
              event = json.load(f)

          # ==================== 提取用户输入 + 定位评论回贴地址 ====================
          user_query    = ""    # 触发评论里写的话
          issue_context = ""    # issue 本身的标题 + 正文（视频里的关键：评论即可开干）
          comments_url  = None
          pr_number     = None

          if event_nm == "issue_comment":
              user_query   = event.get("comment", {}).get("body", "")
              issue        = event.get("issue", {})
              # 把 issue 的标题和正文也带上，这样在一个写好需求的 issue 下评论 @deepseek 即可直接开始
              issue_context = f"Issue 标题：{issue.get('title','')}\n\nIssue 正文：\n{issue.get('body','') or '(无正文)'}"
              comments_url = issue.get("comments_url")
              if "pull_request" in issue:
                  pr_number = issue.get("number")   # PR 复用 issue 编号
          elif event_nm == "pull_request_review_comment":
              user_query = event.get("comment", {}).get("body", "")
              pr_number  = event.get("pull_request", {}).get("number")
              if pr_number:
                  comments_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          elif event_nm == "issues":
              issue = event.get("issue", {})
              user_query   = (issue.get("body") or "") + "\n\n" + (issue.get("title") or "")
              comments_url = issue.get("comments_url")
          elif event_nm == "pull_request_review":
              user_query = event.get("review", {}).get("body", "") or ""
              pr_number  = event.get("pull_request", {}).get("number")
              if pr_number:
                  comments_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"

          user_query = re.sub(r'@deepseek', '', user_query, flags=re.IGNORECASE).strip()
          if not user_query and not issue_context:
              print("用户查询为空，跳过")
              raise SystemExit(0)
          print(f"查询: {user_query[:120]}")

          # ==================== 取 PR diff（用 gh，最稳）====================
          def get_pr_diff(num):
              if not num:
                  return ""
              try:
                  r = subprocess.run(
                      ["gh", "pr", "diff", str(num)],
                      capture_output=True, text=True, timeout=60,
                      env={**os.environ, "GH_TOKEN": gh_token},
                  )
                  if r.returncode == 0:
                      diff = r.stdout
                      return diff[:100000] + "\n...(diff 过大，已截断)..." if len(diff) > 100000 else diff
                  return f"(获取 diff 失败: {r.stderr.strip()})"
              except Exception as e:
                  return f"(获取 diff 异常: {e})"

          # ==================== 调 DeepSeek（OpenAI 兼容端点）====================
          SYSTEM_PROMPT = (
              "你是一个资深代码助手。你会拿到本仓库的真实文件内容、issue 需求、以及（如有）PR 变更。"
              "请【基于这些真实代码】分析并给出修改方案，不要假设技术栈或泛泛而谈。"
              "这是只读环境：你不能执行命令，如需改动请给出完整代码块并标明确切文件路径与改动位置，由用户手动应用。"
              "请用清晰的 Markdown 输出。"
          )

          def call_deepseek(messages, temperature=0.3):
              data = {"model": model, "messages": messages, "stream": False, "temperature": temperature}
              req = urllib.request.Request(
                  "https://api.deepseek.com/chat/completions",
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json",
                           "Authorization": f"Bearer {api_key}"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      out = json.loads(resp.read().decode("utf-8"))
                      return out["choices"][0]["message"]["content"]
              except urllib.error.HTTPError as e:
                  return f"API 调用失败 ({e.code}): {e.read().decode()}"
              except Exception as e:
                  return f"发生错误: {e}"

          # ==================== 读取仓库：文件树 + 让模型挑文件 + 读取内容 ====================
          def get_file_tree():
              # 用 git ls-files，只列被跟踪的文件（天然排除 node_modules / .git 等）
              try:
                  r = subprocess.run(["git", "ls-files"], capture_output=True, text=True, timeout=30)
                  files = [f for f in r.stdout.splitlines() if f.strip()]
              except Exception:
                  files = []
              # 过滤明显的二进制/锁文件/体积大的资源
              skip_ext = (".png",".jpg",".jpeg",".gif",".svg",".ico",".pdf",".lock",
                          ".woff",".woff2",".ttf",".map",".min.js",".min.css")
              files = [f for f in files if not f.lower().endswith(skip_ext)]
              return files[:400]   # 文件树最多列 400 个，防止过长

          def pick_files(file_list, context_text, max_pick=8):
              """第一遍：让模型从文件树里挑出最相关的若干文件，返回路径列表。"""
              prompt = (
                  "下面是本仓库的文件清单。根据 issue 需求，挑出最多 "
                  f"{max_pick} 个你需要查看其内容才能给出准确修改方案的文件。"
                  "只返回一个 JSON 数组（形如 [\"path/a\", \"path/b\"]），不要任何多余文字。\n\n"
                  f"== 需求 ==\n{context_text}\n\n== 文件清单 ==\n" + "\n".join(file_list)
              )
              raw = call_deepseek([{"role": "user", "content": prompt}], temperature=0.0)
              # 容错解析：去掉可能的 ``` 包裹，提取第一个 JSON 数组
              m = re.search(r'\[.*\]', raw, re.DOTALL)
              if not m:
                  return []
              try:
                  picked = json.loads(m.group(0))
                  return [p for p in picked if isinstance(p, str) and p in file_list][:max_pick]
              except Exception:
                  return []

          def read_files(paths, per_file_cap=12000, total_cap=80000):
              """读取选中文件内容，带单文件与总量上限，避免 token 爆掉。"""
              chunks, total = [], 0
              for p in paths:
                  try:
                      with open(p, "r", encoding="utf-8", errors="replace") as fh:
                          content = fh.read(per_file_cap + 1)
                      if len(content) > per_file_cap:
                          content = content[:per_file_cap] + "\n...(文件过大，已截断)..."
                  except Exception as e:
                      content = f"(读取失败: {e})"
                  block = f"\n===== 文件: {p} =====\n{content}\n"
                  if total + len(block) > total_cap:
                      chunks.append("\n...(已达内容上限，省略其余文件)...")
                      break
                  chunks.append(block); total += len(block)
              return "".join(chunks)

          pr_diff = get_pr_diff(pr_number)

          # 组合“需求文本”（issue 标题/正文 + 评论 + PR diff），供选文件用
          need_text = ""
          if issue_context:
              need_text += issue_context + "\n\n"
          need_text += f"用户评论：{user_query or '（无额外内容，按 issue 需求处理）'}\n"
          if pr_diff:
              need_text += f"\nPR 变更：\n{pr_diff[:4000]}\n"

          tree = get_file_tree()
          picked = pick_files(tree, need_text) if tree else []
          print(f"模型选定文件: {picked}")
          code_context = read_files(picked) if picked else ""

          # ==================== 第二遍：带着真实代码给出答案 ====================
          user_content = ""
          if issue_context:
              user_content += f"{issue_context}\n\n"
          user_content += f"用户在评论中的请求：{user_query or '（评论无额外内容，请基于上面的 Issue 与下方代码来处理）'}\n"
          if pr_diff:
              user_content += f"\n当前 PR 代码变更：\n```diff\n{pr_diff}\n```\n"
          if code_context:
              user_content += f"\n以下是仓库中相关文件的真实内容，请基于它们给出具体修改：\n{code_context}\n"
          else:
              user_content += "\n（注：未能定位到相关文件，请说明你需要查看哪些文件，并给出基于常见结构的建议。）\n"

          answer = call_deepseek([
              {"role": "system", "content": SYSTEM_PROMPT},
              {"role": "user",   "content": user_content},
          ])

          # ==================== 回贴评论 ====================
          if comments_url:
              body = f"## 🤖 DeepSeek 助手\n\n{answer}\n\n---\n*由 {model} 驱动 · GitHub Actions 自动运行（只读模式）*"
              req = urllib.request.Request(
                  comments_url,
                  data=json.dumps({"body": body}).encode("utf-8"),
                  headers={"Content-Type": "application/json",
                           "Authorization": f"token {gh_token}",
                           "Accept": "application/vnd.github+json"},
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      print("评论发布成功")
              except Exception as e:
                  print(f"评论发布失败: {e}")
          else:
              print("无法确定评论 URL，仅打印结果：\n" + answer)

          print("完成")
          AGENT_SCRIPT
