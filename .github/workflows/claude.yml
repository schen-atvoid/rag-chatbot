name: DeepSeek Interactive Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  deepseek-agent:
    if: |
      contains(format('{0}', github.event.comment.body), '@claude') ||
      contains(format('{0}', github.event.issue.body), '@claude') ||
      contains(format('{0}', github.event.issue.title), '@claude') ||
      contains(format('{0}', github.event.review.body), '@claude')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run DeepSeek Agent (native tool calling, comment-only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MODEL_NAME: "deepseek-v4-flash"
          MAX_ROUNDS: "5"
          MODE: "comment"
        run: python3 .github/scripts/deepseek_agent.py
